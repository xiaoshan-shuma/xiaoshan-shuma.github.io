<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0e" />
<title>富士胶片参数 · 速查</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0e;
    --surface: #18181f;
    --surface-hover: #1f1f28;
    --border: #272730;
    --border-soft: rgba(255,255,255,0.04);
    --text-primary: #f2f2f5;
    --text-secondary: #92929f;
    --text-tertiary: #555563;
    --accent: #d4a574;
    --accent-glow: rgba(212,165,116,0.08);
    --tag-bg: rgba(212,165,116,0.10);
    --tag-text: #d4a574;
    --radius-md: 14px;
    --radius-lg: 20px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Inter", sans-serif;
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0 16px 64px;
    overflow-x: hidden;
    position: relative;
  }

  #grain {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.30;
    mix-blend-mode: overlay;
  }

  .ambient {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    will-change: transform;
  }
  .ambient-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(212,165,116,0.04), transparent 70%);
    top: -200px; right: -200px;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .ambient-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(100,140,180,0.03), transparent 70%);
    bottom: -150px; left: -150px;
    animation: drift 16s ease-in-out infinite alternate-reverse;
  }
  .ambient-3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(180,160,140,0.03), transparent 70%);
    top: 40%; left: 20%;
    animation: drift 14s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(60px, -40px) scale(1.08); }
  }

  header {
    padding: 64px 0 4px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  header .brand-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  header .brand-logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text-primary);
    background: linear-gradient(135deg, #d4a574 0%, #b8895e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
  }
  header .brand-divider {
    width: 1px;
    height: 14px;
    background: var(--border);
    opacity: 0.5;
  }
  header .brand-tagline {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-tertiary);
    text-transform: uppercase;
  }
  header .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    opacity: 0.7;
  }
  header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.15;
    background: linear-gradient(135deg, #f2f2f5 0%, #c8a87c 60%, #d4a574 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 400;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 0 20px;
    background: linear-gradient(180deg, var(--bg) 50%, transparent);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
  }
  .toolbar-inner {
    max-width: 680px;
    margin: 0 auto;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-tertiary);
    pointer-events: none;
    transition: color .3s;
  }
  .search-wrap:focus-within svg { color: var(--accent); }

  #search {
    width: 100%;
    padding: 13px 14px 13px 44px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 15px;
    font-family: var(--font);
    outline: none;
    transition: border-color .3s, box-shadow .3s, background .3s;
    -webkit-appearance: none;
    appearance: none;
  }
  #search::placeholder { color: var(--text-tertiary); }
  #search:focus {
    border-color: var(--accent);
    background: rgba(24,24,31,0.95);
    box-shadow: 0 0 0 4px var(--accent-glow), inset 0 1px 2px rgba(0,0,0,0.3);
  }

  .toolbar-bottom {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }
  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 2px 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex: 1;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12.5px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: all .25s cubic-bezier(0.22, 1, 0.36, 1);
    white-space: nowrap;
    letter-spacing: 0.1px;
  }
  .filter-btn:hover { border-color: var(--text-tertiary); color: var(--text-primary); }
  .filter-btn.active {
    background: var(--tag-bg);
    border-color: rgba(212,165,116,0.4);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(212,165,116,0.06);
  }

  .result-count {
    font-size: 12px;
    color: var(--text-tertiary);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    transition: opacity .3s;
    flex-shrink: 0;
  }

  .grid {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-top: 4px;
    position: relative;
    z-index: 1;
  }

  .card {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow .35s cubic-bezier(0.22, 1, 0.36, 1),
                border-color .35s cubic-bezier(0.22, 1, 0.36, 1);
    min-height: 190px;
    cursor: pointer;
    position: relative;
    opacity: 0;
    transform: translateY(16px);
  }
  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 0 0 1px rgba(212,165,116,0.08);
    border-color: rgba(212,165,116,0.15);
  }
  .card:active { transform: translateY(-1px) scale(0.995); }
  .card.hidden { display: none; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 10px;
    border-bottom: 0.5px solid var(--border-soft);
    min-height: 48px;
  }
  .card-header h3 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.3;
    background: linear-gradient(135deg, #f2f2f5 0%, #c8a87c 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card-header .header-film {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 100px;
    border: 0.5px solid var(--border-soft);
  }
  .card-content {
    display: flex;
    flex-direction: row;
    flex: 1;
    min-height: 0;
  }
  .card-img {
    flex: 0 0 28%;
    min-width: 110px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img .recipe-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .5s cubic-bezier(0.22,1,0.36,1), filter .5s ease;
  }
  .card-img .recipe-img + .img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 1;
  }
  .card-img .recipe-img + .img-overlay + .film-grain {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px;
    opacity: 0.35;
    pointer-events: none;
    mix-blend-mode: overlay;
    z-index: 1;
  }
  .card:hover .recipe-img {
    transform: scale(1.04);
    filter: brightness(1.05);
  }
  .card-img .film-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3px;
    border: 0.5px solid rgba(255,255,255,0.06);
    z-index: 2;
    white-space: nowrap;
    max-width: calc(100% - 16px);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-img .copy-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.3px;
    border: 0.5px solid rgba(212,165,116,0.12);
    z-index: 2;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .3s, transform .3s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  .card:hover .copy-badge {
    opacity: 1;
    transform: translateY(0);
  }

  .card-body {
    flex: 1;
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .card-body .title-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .card-body h2 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.3;
  }
  .card-body .copy-btn {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    background: var(--border);
    color: var(--text-tertiary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .25s;
    font-size: 14px;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity .3s, transform .3s, background .25s, color .25s;
  }
  .card:hover .copy-btn {
    opacity: 1;
    transform: translateY(0);
  }
  .copy-btn:hover {
    background: var(--accent);
    color: #000;
  }
  .copy-btn.copied {
    background: #2d7a4a;
    color: #fff;
  }

  .card-body .desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .param-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 16px;
    margin-top: 1px;
  }
  .param-item {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    padding: 4px 0;
    border-bottom: 0.5px solid var(--border-soft);
  }
  .param-item .label { color: var(--text-tertiary); }
  .param-item .value { color: var(--text-primary); font-weight: 500; font-variant-numeric: tabular-nums; }
  .param-item .value.highlight { color: var(--accent); }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 4px;
  }
  .tag {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 100px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.2px;
    border: 0.5px solid rgba(212,165,116,0.04);
  }
  .tag.weather {
    background: rgba(100,180,220,0.10);
    color: #7ab8d0;
    border-color: rgba(100,180,220,0.04);
  }
  .tag.scene {
    background: rgba(160,140,200,0.10);
    color: #b8a8d8;
    border-color: rgba(160,140,200,0.04);
  }

  .subtitle-note {
    font-size: 11.5px;
    color: var(--text-tertiary);
    line-height: 1.4;
    padding: 6px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border: 0.5px solid var(--border-soft);
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(24,24,31,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 24px;
    font-size: 14px;
    color: var(--text-primary);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 100;
    transition: transform .4s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .empty {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-tertiary);
  }
  .empty svg { width: 40px; height: 40px; margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 15px; line-height: 1.6; }

  footer {
    max-width: 680px;
    margin: 40px auto 0;
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    position: relative;
    z-index: 1;
    padding: 20px 0;
    border-top: 0.5px solid var(--border-soft);
  }

  @media (max-width: 520px) {
    body { padding: 0 12px 32px; }
    header { padding-top: 48px; }
    header h1 { font-size: 26px; }
    .toolbar { padding: 12px 0 16px; margin: 0 -12px; padding-left: 12px; padding-right: 12px; }
    .card-header { padding: 12px 14px 8px; }
    .card-header h3 { font-size: 16px; }
    .card-content { flex-direction: column; }
    .card-img { flex: 0 0 100px; min-width: unset; }

    .card-body { padding: 14px 14px 16px; }
    .card-body .copy-btn { opacity: 1; transform: none; }
    .card-body h2 { font-size: 16px; }
    .param-grid { grid-template-columns: 1fr; }
    .card-img .copy-badge { display: none; }
    .toast { font-size: 13px; padding: 10px 18px; bottom: 24px; }
  }
</style>
</head>
<body>

<canvas id="grain"></canvas>
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="ambient ambient-3"></div>

<header>
  <div class="brand-mark">
    <span class="brand-logo">小珊数码</span>
    <span class="brand-divider"></span>
    <span class="brand-tagline">FILM SIMULATION RECIPES</span>
  </div>
  <h1>富士胶片参数速查</h1>
  <p><span id="totalCount">30</span> 组直出方案 · 一键抄作业</p>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="search" placeholder="搜索胶片模拟、场景、关键词…" autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>
    <div class="toolbar-bottom">
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all">全部</button>
      </div>
      <span class="result-count" id="resultCount"></span>
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer>数据持续更新中 · 欢迎群友贡献参数</footer>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
// ───────────────────────── RECIPES DATA ─────────────────────────
// 30 组热门富士直出胶片模拟参数
const recipes = [
  // ═══════════════ Classic Neg. (NC) ═══════════════

  {
    id: "nc-dark-1", film: "Classic Neg.",
    title: "NC 暗调高级感",
    desc: "低对比 · 暗调质感 · 室内静物 & 探店",
    params: [
      ["颗粒效果","弱/小"],
      ["色彩效果","强"],
      ["彩色FX蓝色","弱"],
      ["白平衡","自动 R-2 B 3"],
      ["动态范围","DR200"],
      ["高光 H","-1"],
      ["阴影 S","-0.5"],
      ["色彩","+3"],
      ["锐度","-1"],
      ["清晰度","0"],
      ["高ISO降噪","-2"]
    ],
    extras: [
      ["曝光","0 或 -1（根据环境 ±）"],
      ["天气","晴天 / 阴天（室内）"],
      ["场景", "探店 · 室内静物"]
    ],
    tags: ["暗调","室内","静物","探店"],
    palette: ["#2d2a26","#3a3530","#231f1c","#443e38","#1a1715"]
  },
  {
    id: "nc-c200", film: "Classic Neg.",
    title: "NC 仿 C200 胶片感",
    desc: "暖调颗粒感 · 仿柯达 C200 · 人像 & 扫街",
    params: [
      ["颗粒效果","强/小"],
      ["色彩效果","弱"],
      ["彩色FX蓝色","弱"],
      ["白平衡","自动 R1 B -1"],
      ["动态范围","DR200"],
      ["高光 H","-1"],
      ["阴影 S","0"],
      ["色彩","+2"],
      ["锐度","-1"],
      ["清晰度","-2"],
      ["高ISO降噪","-2"]
    ],
    extras: [
      ["曝光","+1/3 或 +2/3"],
      ["天气","晴天 / 阴天"],
      ["场景", "人像 · 扫街 · 探店 · 室内静物"]
    ],
    tags: ["暖调","人像","扫街","胶片感"],
    palette: ["#c9a87c","#b8956a","#dbbc92","#a88560","#e3cbaa"]
  },
  {
    id: "nc-sharp", film: "Classic Neg.",
    title: "NC 通透清晰版",
    desc: "高锐度 · 高清晰度 · 告别发灰 · 通用方案",
    params: [
      ["颗粒效果","弱/小"],
      ["色彩效果","弱"],
      ["彩色FX蓝色","弱"],
      ["白平衡","自动 R-2 B 1"],
      ["动态范围","DR100"],
      ["高光 H","+2"],
      ["阴影 S","-1"],
      ["色彩","+2"],
      ["锐度","+1"],
      ["清晰度","+2"],
      ["高ISO降噪","-2"]
    ],
    extras: [
      ["曝光","+1/3 或 +2/3"],
      ["天气","晴天 / 阴天"],
      ["场景", "人像 · 扫街 · 探店 · 室内静物"]
    ],
    tags: ["高锐度","通透","静物","探店"],
    palette: ["#e8e2d8","#d5cec2","#f2ede4","#c4bcae","#ffffff"]

    params: [["高光","-1"],["阴影","-0.5"],["锐度","-1"],["曝光","0 ~ +1/3"],["降噪","-2"]],

    params: [["高光","+1"],["阴影","+1"],["锐度","+1"],["颗粒效果","强"],["曝光","0"],["降噪","-4"]],
    tags: ["黑白","粗颗粒","纪实","街拍"],
    palette: ["#e8e8e8","#c4c4c4","#9c9c9c","#6c6c6c","#3c3c3c"]
  }
];

// ─────────────────── film grain canvas ───────────────────
(function initGrain() {
  const canvas = document.getElementById('grain');
  const ctx = canvas.getContext('2d');
  let w, h;
  function resize() {
    w = canvas.width = window.innerWidth * devicePixelRatio;
    h = canvas.height = window.innerHeight * devicePixelRatio;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    const iData = ctx.createImageData(w, h);
    const d = iData.data;
    const len = d.length;
    for (let i = 0; i < len; i += 4) {
      const v = Math.random() * 255;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 30;
    }
    ctx.putImageData(iData, 0, 0);
    requestAnimationFrame(() => setTimeout(draw, 40));
  }
  draw();
})();

// ─────────────────── build UI ───────────────────
const grid = document.getElementById('grid');
const filterRow = document.getElementById('filterRow');
const searchInput = document.getElementById('search');
const resultCount = document.getElementById('resultCount');
const totalCount = document.getElementById('totalCount');
const toast = document.getElementById('toast');

let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

const films = [...new Set(recipes.map(r => r.film))];
films.forEach(f => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = f;
  btn.textContent = f;
  filterRow.appendChild(btn);
});

totalCount.textContent = recipes.length;

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyRecipe(r) {
  const lines = [`📷 ${r.title} (${r.film})`, '',
    ...r.params.map(p => `${p[0]}：${p[1]}`),
    ...(r.extras ? ['', ...r.extras.map(p => `📌 ${p[0]}：${p[1]}`)] : []),
    '', `🏷️ ${r.tags.join(' · ')}`];
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    showToast('参数已复制，发群里吧 📋');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('参数已复制 📋');
  });
}

function renderCards(list) {
  grid.innerHTML = '';
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>没有匹配的方案</p><span style="font-size:13px;color:var(--text-tertiary)">试试其他关键词或筛选条件</span></div>';
    resultCount.textContent = '0 个方案';
    return;
  }
  resultCount.textContent = `${list.length} 个方案`;

  list.forEach((r, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = r.id;

    // ── recipe name as top header ──
    const headerDiv = document.createElement('div');
    headerDiv.className = 'card-header';
    const headerTitle = document.createElement('h3');
    headerTitle.textContent = r.title;
    const headerFilm = document.createElement('span');
    headerFilm.className = 'header-film';
    headerFilm.textContent = r.film;
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    copyBtn.title = '复制参数';
    copyBtn.addEventListener('click', e => { e.stopPropagation(); copyRecipe(r); });
    headerDiv.appendChild(headerTitle);
    headerDiv.appendChild(headerFilm);
    headerDiv.appendChild(copyBtn);
    card.appendChild(headerDiv);

    // ── content row: image + params ──
    const contentRow = document.createElement('div');
    contentRow.className = 'card-content';

    // left image area
    const imgDiv = document.createElement('div');
    imgDiv.className = 'card-img';
    const badge = document.createElement('span');
    badge.className = 'film-badge';
    badge.textContent = r.film;
    const copyBadge = document.createElement('span');
    copyBadge.className = 'copy-badge';
    copyBadge.textContent = '⏎ 点击复制';

    // real photo from picsum.photos
    const recipeImg = document.createElement('img');
    recipeImg.className = 'recipe-img';
    recipeImg.src = `https://picsum.photos/id/${(idx % 30) + 10}/800/800`;
    recipeImg.alt = r.title;
    recipeImg.loading = 'lazy';
    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    const grain = document.createElement('div');
    grain.className = 'film-grain';
    imgDiv.appendChild(recipeImg);
    imgDiv.appendChild(overlay);
    imgDiv.appendChild(grain);
    imgDiv.appendChild(badge);
    imgDiv.appendChild(copyBadge);

    // right body
    const body = document.createElement('div');
    body.className = 'card-body';

    const desc = document.createElement('p');
    desc.className = 'desc';
    desc.textContent = r.desc;

    const paramGrid = document.createElement('div');
    paramGrid.className = 'param-grid';
    r.params.forEach(p => {
      if (p[0].startsWith('——')) {
        // section divider — show as a full-width note
        const divider = document.createElement('div');
        divider.style.cssText = 'grid-column:1/-1;font-size:11px;color:var(--accent);font-weight:600;padding:6px 0 2px;letter-spacing:0.5px;border:none;';
        divider.textContent = p[0].replace(/——/g, '');
        paramGrid.appendChild(divider);
        return;
      }
      const item = document.createElement('div');
      item.className = 'param-item';
      const isLongValue = p[1].length > 18;
      item.innerHTML = `<span class="label">${escapeHtml(p[0])}</span><span class="value${p[1] === '' ? '' : ''}"${isLongValue ? ' style="font-size:11px;text-align:right;"' : ''}>${escapeHtml(p[1])}</span>`;
      paramGrid.appendChild(item);
    });

    // extras section
    if (r.extras) {
      const extraDiv = document.createElement('div');
      extraDiv.style.cssText = 'margin-top:4px;padding-top:6px;border-top:0.5px solid rgba(212,165,116,0.08);';
      r.extras.forEach(e => {
        const item = document.createElement('div');
        item.className = 'param-item';
        item.innerHTML = `<span class="label" style="color:var(--accent);font-weight:500;">${escapeHtml(e[0])}</span><span class="value">${escapeHtml(e[1])}</span>`;
        extraDiv.appendChild(item);
      });
      body.appendChild(extraDiv);
    }

    const tagRow = document.createElement('div');
    tagRow.className = 'tag-row';
    r.tags.forEach(t => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = t;
      tagRow.appendChild(span);
    });

    body.appendChild(desc);
    body.appendChild(paramGrid);
    body.appendChild(tagRow);

    card.addEventListener('click', () => copyRecipe(r));

    contentRow.appendChild(imgDiv);
    contentRow.appendChild(body);
    card.appendChild(contentRow);
    grid.appendChild(card);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.style.transition = `opacity .45s cubic-bezier(0.22,1,0.36,1), transform .45s cubic-bezier(0.22,1,0.36,1)`;
        card.style.transitionDelay = `${Math.min(idx * 0.04, 0.8)}s`;
        card.classList.add('visible');
      });
    });
  });
}

// ─────────────────── filtering ───────────────────
let activeFilter = 'all';
let searchQuery = '';

function filterAndRender() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = recipes.filter(r => {
    if (activeFilter !== 'all' && r.film !== activeFilter) return false;
    if (q) {
      const haystack = (r.title + r.film + r.desc + r.tags.join('')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  renderCards(filtered);
}

filterRow.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  filterAndRender();
});

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  filterAndRender();
});

// ─────────────────── init ───────────────────
filterAndRender();
</script>
</body>
</html>
